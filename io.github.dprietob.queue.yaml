app-id: io.github.dprietob.queue
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: queue

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'
  - '*.la'

modules:
  - name: queue
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/dprietob/queue.git
        tag: '1.1.1'
        commit: 4af7a62edba9b4f4973ecc725d5f55d3d00d146a
